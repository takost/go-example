name: Dependency Review
on: 
  workflow_dispatch:
permissions:
  contents: read
jobs:
  dependency-review:
    name: Dependency review
    runs-on: [self-hosted]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@takost/update-to-node-20
        with:
          fail-on-severity: low
          license-check: false
